name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        # Force bash on every runner — windows-latest defaults to PowerShell,
        # which would break our shell scripts. Git Bash ships with the runner.
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          # Pin so the action skips the unauthenticated GitHub-API call to find
          # "latest" — that call rate-limits on shared CI runners (HTTP 403)
          # and turned macOS jobs flaky.
          bats-version: 1.13.0

      - name: Verify environment
        run: |
          echo "OS:    $(uname -s)"
          echo "bash:  $(bash --version | head -1)"
          echo "jq:    $(jq --version)"
          echo "just:  $(just --version)"
          echo "bats:  $(bats --version)"

      - name: Verify routing presets (no drift between source and committed)
        run: just preset-verify

      - name: Run bats-core test suite
        run: just test-bats --tap
